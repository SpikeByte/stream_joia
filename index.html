<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joia TV - Premium Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Container do Player Dinâmico */
        .player-container {
            width: 100%;
            max-width: 1100px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Força o player nativo a ocupar o espaço correto com os controles embaixo */
        video {
            width: 100%;
            display: block;
            max-height: 70vh;
            background: #000;
        }

        .playlist-container {
            width: 100%;
            max-width: 1100px;
            margin-top: 30px;
        }

        .playlist-title {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 252, 241, 0.3);
        }

        .thumbnail-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            position: relative;
        }

        .thumbnail-placeholder::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-size: 0.9rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            header h1 { font-size: 1.4rem; text-align: center; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .video-info { padding: 8px; }
            .video-title { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>CineDrive</h1>
    </header>

    <div class="player-container">
        <video id="videoPlayer" controls playsinline preload="metadata">
            <source src="" type="video/mp4">
            Seu navegador não suporta a tag de vídeo.
        </video>
    </div>

    <div class="playlist-container">
        <div class="playlist-title">Próximos Vídeos</div>
        <div class="video-grid" id="videoGrid"></div>
    </div>

    <script>
        // O SEGREDO: Usamos a URL de drive.google.com/uc?export=download&confirm=t
        // O parâmetro &confirm=t diz ao Google para ignorar o aviso de vírus e entregar o arquivo bruto.
        const videosData = [
            {
                id: "1",
                title: "Episódio 3x01",
                url: "https://docs.google.com/uc?export=download&confirm=t&id=1XSLwrLo0oOD3AN6dnx1rYaiW9TBkrfuk" 
            },
            {
                id: "2",
                title: "Episódio 3x02 Em Breve...",
                url: "https://docs.google.com/uc?export=download&confirm=t&id=ID_DO_SEGUNDO_VIDEO"
            }
        ];

        const videoGrid = document.getElementById('videoGrid');
        const videoPlayer = document.getElementById('videoPlayer');

        function loadVideo(videoUrl) {
            videoPlayer.src = videoUrl;
            videoPlayer.load();
            videoPlayer.play().catch(error => {
                console.log("Autoplay bloqueado pelo navegador, aguardando clique do usuário.");
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPlaylist() {
            videoGrid.innerHTML = '';
            videosData.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail-placeholder"></div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                    </div>
                `;
                card.addEventListener('click', () => loadVideo(video.url));
                videoGrid.appendChild(card);
            });
        }

        // Inicialização limpa
        if(videosData.length > 0) {
            videoPlayer.src = videosData[0].url;
        }
        
        renderPlaylist();
    </script>
</body>
</html>
