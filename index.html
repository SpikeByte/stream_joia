<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joia TV - Premium Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CONTAINER MASTER - Técnica de mascaramento para conter o player do Drive */
        .player-wrapper {
            width: 100%;
            max-width: 1100px;
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Mantém a proporção de cinema perfeita */
        .player-container {
            width: 100%;
            position: relative;
            padding-top: 56.25%; /* Proporção 16:9 */
            overflow: hidden;
        }

        /* O SEGREDO DO MOBILE: Corta os controles deformados do topo criando uma área de escape oculta */
        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* BARRA DE CONTROLES AUXILIAR EXTERNA - Garante avanço rápido e fluidez caso o player nativo suma no celular */
        .custom-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        .playlist-container {
            width: 100%;
            max-width: 1100px;
            margin-top: 30px;
        }

        .playlist-title {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 252, 241, 0.3);
        }

        .thumbnail-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #1f2833, #0b0c10);
            position: relative;
        }

        .thumbnail-placeholder::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-size: 0.9rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            header h1 { font-size: 1.4rem; text-align: center; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .video-info { padding: 8px; }
            .video-title { font-size: 0.8rem; }
            
            /* Ajuste fino para forçar o iFrame a recalcular os botões internos no celular */
            .player-container {
                padding-top: 56.25%; 
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Joia TV</h1>
    </header>

    <div class="player-wrapper">
        <div class="player-container">
            <iframe id="videoPlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        <div class="custom-controls">
            <button class="control-btn" onclick="refreshPlayer()">🔄 Recarregar Player</button>
        </div>
    </div>

    <div class="playlist-container">
        <div class="playlist-title">Próximos Vídeos</div>
        <div class="video-grid" id="videoGrid"></div>
    </div>

    <script>
        // Retornamos ao formato seguro /preview para arquivos pesados (1.5GB+)
        const videosData = [
            {
                id: "1",
                title: "Episódio 3x01",
                url: "https://drive.google.com/file/d/1XSLwrLo0oOD3AN6dnx1rYaiW9TBkrfuk/preview" 
            },
            {
                id: "2",
                title: "Episódio 3x02 Em Breve...",
                url: "https://drive.google.com/file/d/1_ID_DO_SEGUNDO_VIDEO/preview"
            }
        ];

        const videoGrid = document.getElementById('videoGrid');
        const iframePlayer = document.getElementById('videoPlayer');

        function loadVideo(videoUrl) {
            iframePlayer.src = videoUrl;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Função utilitária caso a rede falhe ao carregar o bloco de 1.5GB
        function refreshPlayer() {
            const currentSrc = iframePlayer.src;
            iframePlayer.src = '';
            setTimeout(() => {
                iframePlayer.src = currentSrc;
            }, 100);
        }

        function renderPlaylist() {
            videoGrid.innerHTML = '';
            videosData.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="thumbnail-placeholder"></div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                    </div>
                `;
                card.addEventListener('click', () => loadVideo(video.url));
                videoGrid.appendChild(card);
            });
        }

        // Inicialização estável
        if(videosData.length > 0) {
            iframePlayer.src = videosData[0].url;
        }
        
        renderPlaylist();
    </script>
</body>
</html>
